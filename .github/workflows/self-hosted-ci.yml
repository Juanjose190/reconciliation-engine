name: Self-Hosted CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-lint:
    runs-on:
      - self-hosted
      - reconciliation
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace api

      - name: Lint API
        run: npm run lint --workspace api

      - name: Build Web
        run: npm run build --workspace web

      - name: Typecheck Web
        run: npm run lint --workspace web
