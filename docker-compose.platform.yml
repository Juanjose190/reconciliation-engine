services:
  traefik:
    image: traefik:v3.2
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "8080:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  api-manager:
    image: kong:3.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./infra/kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.api-manager.rule=PathPrefix(`/api`)
      - traefik.http.routers.api-manager.entrypoints=web
      - traefik.http.services.api-manager.loadbalancer.server.port=8000

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    depends_on:
      - keycloak-db
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8082:8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak.rule=PathPrefix(`/auth`)
      - traefik.http.routers.keycloak.entrypoints=web
      - traefik.http.services.keycloak.loadbalancer.server.port=8080

  kafka:
    image: redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - kafka_data:/var/lib/redpanda/data

  cloudflare-tunnel:
    image: cloudflare/cloudflared:2025.1.0
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - traefik

  github-runner:
    image: myoung34/github-runner:2.326.0
    profiles:
      - ci
    environment:
      REPO_URL: ${GITHUB_RUNNER_REPO_URL:-https://github.com/Juanjose190/reconciliation-engine}
      RUNNER_TOKEN: ${GITHUB_RUNNER_TOKEN:-}
      RUNNER_NAME: ${GITHUB_RUNNER_NAME:-reconciliation-local-runner}
      RUNNER_WORKDIR: /tmp/github-runner
      LABELS: reconciliation,self-hosted,local
      RUN_AS_ROOT: "false"
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      - github_runner_data:/runner/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  keycloak_data:
  kafka_data:
  github_runner_data:
